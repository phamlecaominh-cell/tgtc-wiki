  <style>
:root{--bg:#0d0f14;--surface:#161921;--surface2:#1e222d;--red:#8b1a1a;--red-light:#c0392b;--gold:#b8860b;--gold-muted:#8b7335;--text:#e0ddd5;--text-muted:#9a9689;--border:#2a2e3a}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);margin:0}
h1,h2,h3,h4{font-family:'Playfair Display',serif}
.nav-btn{padding:0.5rem 1rem;border-radius:4px;font-size:0.85rem;font-weight:600;transition:all 0.2s;border:1px solid transparent}
.nav-btn.active,.nav-btn:hover{background:var(--red);border-color:var(--red-light);color:#fff}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;transition:border-color 0.2s;cursor:pointer}
.card:hover{border-color:var(--gold-muted)}
.badge{font-size:0.7rem;padding:2px 8px;border-radius:3px;font-weight:600;text-transform:uppercase}
.badge-cat{background:#1a2a1a;color:#4ade80}
.badge-status{background:#2a1a1a;color:#f87171}
.badge-sub{background:#1a1a2a;color:#93c5fd}
.classified-box{background:linear-gradient(135deg,#1a0a0a,#0d0f14);border:1px solid var(--red);border-radius:8px;padding:1.5rem;position:relative;overflow:hidden}
.classified-box::before{content:'MẬT';position:absolute;top:10px;right:10px;font-size:0.65rem;background:var(--red);color:#fff;padding:2px 8px;border-radius:2px;font-weight:700}
.page{display:none}.page.active{display:block}
input,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.5rem 0.75rem;border-radius:4px;font-size:0.85rem}
input:focus,select:focus{outline:none;border-color:var(--gold-muted)}
.timeline-line{border-left:2px solid var(--red);margin-left:1rem;padding-left:1.5rem}
.btn{padding:0.5rem 1rem;border-radius:4px;font-weight:600;font-size:0.85rem;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all 0.2s}
.btn:hover{border-color:var(--gold-muted);color:var(--gold)}
.btn-red{background:var(--red);border-color:var(--red-light);color:#fff}
.btn-red:hover{background:var(--red-light)}
</style>
 </head>

  <script>
const defaultWikiEntries=[{id:"he-thong-thong-che",name:"Hệ Thống Thống Chế",description:"Hệ thống cai trị tối cao của hành tinh 771-A, nơi mỗi khu vực được thống trị bởi một Thống Chế.",hidden_truth:"Hệ thống này bắt nguồn từ Thần Định Ước, người đã tự chia bản thân thành 26 phần để duy trì trật tự cực đoan của hành tinh.",related_articles:["Thần Định Ước","Công Trình Định Ước","Hành Tinh 771-A"],category:"Lore",subcategory:"System",public_knowledge:"Thống Chế là người cai trị tối cao của từng khu vực. Mỗi Thống Chế sở hữu quyền lực quân sự và chính trị tuyệt đối.",status:"Canon",image:"",era:"Thời Đại 26 Thống Chế",order:30},{id:"hanh-tinh-771a",name:"Hành Tinh 771-A",description:"Hành tinh nơi toàn bộ câu chuyện chính diễn ra.",hidden_truth:"Hành tinh từng bị các thế lực ngoài hành tinh xếp vào trạng thái chờ thanh trừ.",related_articles:["Hệ Thống Thống Chế","Ba Vị Thần","Hành Tinh Quỷ"],category:"Locations",subcategory:"Planet",public_knowledge:"Hành tinh được chia thành 26 khu vực, mỗi khu vực được cai trị bởi một Thống Chế.",status:"Canon",image:"",era:"Toàn Lịch Sử",order:20},{id:"ba-vi-than",name:"Ba Vị Thần",description:"Ba thực thể thần linh đầu tiên đặt nền móng cho nền văn minh của hành tinh.",hidden_truth:"Ba vị thần không phải là thực thể toàn năng. Họ là một loài sinh vật thần linh có thể bị thương, bị phong ấn hoặc bị giết.",related_articles:["Thần Định Ước","Thần Kỵ Sĩ","Thần Phước Lành"],category:"Lore",subcategory:"Divine",public_knowledge:"Truyền thuyết cổ đại ghi nhận sự tồn tại của ba vị thần khai sinh văn minh.",status:"Canon",image:"",era:"Thời Đại Ba Vị Thần",order:11},{id:"than-dinh-uoc",name:"Thần Định Ước",description:"Một trong Ba Vị Thần, gắn liền với luật lệ, hệ thống và khế ước.",hidden_truth:"Thần Định Ước đã tự chia bản thân thành 26 phần để tạo nền móng cho hệ thống Thống Chế.",related_articles:["Ba Vị Thần","Hệ Thống Thống Chế","Công Trình Định Ước"],category:"Characters",subcategory:"God",public_knowledge:"Được xem là vị thần của trật tự và khế ước.",status:"Canon",image:"",era:"Thời Đại Ba Vị Thần",order:12},{id:"than-ky-si",name:"Thần Kỵ Sĩ",description:"Một trong Ba Vị Thần, từng bảo vệ nền văn minh đầu tiên của hành tinh.",hidden_truth:"Sau thất bại trước Chúa Trời, Thần Kỵ Sĩ bị chia tách thành nhiều phần và hiện có vật chứa liên quan tới Kael (A).",related_articles:["Ba Vị Thần","Kael (A)","Kỵ Sĩ Săn Ma Sói"],category:"Characters",subcategory:"God",public_knowledge:"Được ghi nhớ như một vị thần chiến binh bảo hộ nhân loại.",status:"Canon",image:"",era:"Thời Đại Ba Vị Thần",order:13},{id:"than-phuoc-lanh",name:"Thần Phước Lành",description:"Một trong Ba Vị Thần, gắn liền với sự thịnh vượng và bảo hộ.",hidden_truth:"Thần Phước Lành từng chuyển kiếp thành một pháp sư. Phần thần thánh còn lại của pháp sư đó về sau trở thành Bá Tước.",related_articles:["Ba Vị Thần","Bá Tước"],category:"Characters",subcategory:"God",public_knowledge:"Được xem là vị thần đem lại phước lành cho nền văn minh cổ.",status:"Canon",image:"",era:"Thời Đại Ba Vị Thần",order:14},{id:"ba-tuoc",name:"Bá Tước",description:"Một thực thể cổ đại bí ẩn, gần như nằm ngoài nhận thức của thế giới.",hidden_truth:"Bá Tước là phần thần thánh còn lại của pháp sư từng là chuyển kiếp của Thần Phước Lành. Ông biết nhiều luật thật sự của hệ thống Thống Chế.",related_articles:["Thần Phước Lành","Tòa Lâu Đài","Chúa Trời"],category:"Characters",subcategory:"Cosmic Entity",public_knowledge:"Phần lớn dân số không biết Bá Tước tồn tại. Với người ngoài, ông có thể chỉ là tin đồn.",status:"Cosmic Secret",image:"",era:"Không Xác Định"},{id:"ferrum-noctis",name:"Ferrum Noctis",description:"Một loại kim loại siêu nhiên có giá trị chiến lược cực cao.",hidden_truth:"Ferrum Noctis từng tồn tại ở trạng thái nguyên bản trước khi bị các can thiệp thần linh và siêu nhiên làm biến đổi.",related_articles:["Công Trình Định Ước","Thần Phương Đông"],category:"Technology",subcategory:"Material",public_knowledge:"Được xem là kim loại hiếm có khả năng tương tác với các thực thể siêu nhiên.",status:"Canon",image:"",era:"Thời Đại Cổ Đại",order:40},{id:"astrael",name:"Astrael",description:"Thiên thần sa ngã và cựu quỷ đầu đàn, một trong những thực thể nguy hiểm nhất từng đặt chân lên hành tinh.",hidden_truth:"Astrael từng là quỷ đầu đàn, sau đó lừa Chúa Trời để được phong làm thiên thần trước khi bị trừng phạt.",related_articles:["Hành Tinh Quỷ","Ngày Thứ Bảy","Thần Phương Đông"],category:"Characters",subcategory:"Cosmic Entity",public_knowledge:"Được ghi nhận như một thế lực ngoại lai từng gây ra khủng hoảng toàn hành tinh.",status:"Canon",image:"",era:"Thời Đại Astrael",order:101},{id:"argos",name:"Argos",description:"Công ty vận tải và thương mại do Silas và Leonhardt thành lập.",hidden_truth:"Argos thực chất là tổ chức điều tra dị thường và săn quỷ, được thiết kế để che giấu một cuộc chiến bí mật.",related_articles:["Silas","Leonhardt","Lira","Garen"],category:"Organizations",subcategory:"Company",public_knowledge:"Bề ngoài là một công ty dân sự hoạt động trong lĩnh vực vận tải và thương mại.",status:"Canon",image:"",era:"Thời Đại Argos",order:201},{id:"kael-a",name:"Kael (A)",description:"Thống Chế khu vực A và nhân vật chính đầu tiên của câu chuyện.",hidden_truth:"Kael có liên hệ với phần bị chia tách của Thần Kỵ Sĩ.",related_articles:["Aurelion","Thần Kỵ Sĩ","Khu Vực A"],category:"Characters",subcategory:"Marshal",public_knowledge:"Kael là Thống Chế khu vực A sau khi thay thế Aurelion.",status:"Canon",image:"",era:"Thời Đại Hiện Đại"},{id:"leonhardt",name:"Leonhardt",description:"Cựu sĩ quan khu vực Q, đồng sáng lập Argos.",hidden_truth:"Leonhardt là nguyên mẫu sĩ quan cơ khí của khu vực Q, có khả năng phát triển tâm lý vượt ra ngoài thiết kế ban đầu.",related_articles:["Silas","Argos","Khu Vực Q"],category:"Characters",subcategory:"Officer",public_knowledge:"Leonhardt là một trong những người điều hành Argos.",status:"Canon",image:"",era:"Thời Đại Argos",order:203},{id:"silas",name:"Silas",description:"Cựu sĩ quan khu vực Q, chiến lược gia và đồng sáng lập Argos.",hidden_truth:"Silas là nguyên mẫu sĩ quan cơ khí, được thiết kế như một công cụ chiến thuật nhưng dần phát triển thành cá thể có nhận thức phức tạp hơn.",related_articles:["Leonhardt","Argos","Khu Vực Q"],category:"Characters",subcategory:"Officer",public_knowledge:"Silas là một trong những người điều hành Argos.",status:"Canon",image:"",era:"Thời Đại Argos",order:202},{id:"lira",name:"Lira",description:"Thành viên Argos, một cá thể có liên hệ với linh hồn quỷ và cấu trúc bán quỷ.",hidden_truth:"Lira chứa yếu tố quỷ cấp cao và có khả năng phản ứng bất thường với vật chất quỷ.",related_articles:["Argos","Quỷ","Bán Quỷ"],category:"Characters",subcategory:"Hybrid",public_knowledge:"Lira là thành viên trong nhóm hành động của Argos.",status:"Canon",image:"",era:"Thời Đại Argos",order:204},{id:"garen",name:"Garen",description:"Thành viên chiến đấu của Argos, nổi bật với khả năng cơ khí và mũi khoan.",hidden_truth:"Garen đóng vai trò quan trọng trong các trận chiến chống lại cấu trúc quỷ và thực thể bị khắc định.",related_articles:["Argos","Silas","Leonhardt"],category:"Characters",subcategory:"Officer",public_knowledge:"Garen là một thành viên chiến đấu trong đội hình Argos.",status:"Canon",image:"",era:"Thời Đại Argos",order:205},{id:"hanh-tinh-quy",name:"Hành Tinh Quỷ",description:"Quê hương của loài quỷ.",hidden_truth:"Đây không phải địa ngục mà là một nền văn minh ngoài hành tinh phát triển cao, có luật pháp, thành phố, công nghệ và chính trị riêng.",related_articles:["Quỷ","Astrael","Quỷ Du Hành"],category:"Locations",subcategory:"Planet",public_knowledge:"Được biết đến như thế giới của quỷ.",status:"Canon",image:"",era:"Thời Đại Hành Tinh Quỷ"},{id:"quy",name:"Quỷ",description:"Một chủng loài ngoài hành tinh văn minh, không có nguồn gốc từ hành tinh 771-A.",hidden_truth:"Quỷ là một loài có nền văn minh độc lập. Họ không phải sinh vật hỗn loạn vô tri.",related_articles:["Hành Tinh Quỷ","Astrael","Thần Phương Đông"], // Persistence layer with single canonical key and migration
const CANONICAL_KEY='tgtc_database_v1';
const LEGACY_KEYS=['tgtc_wikiEntries','tgtc_chapters','tgtc_database','wikiEntries','chapters','database','tgtcData'];
let wikiEntries=[];
let chapters=[];
let lastLoadTime=null;
let lastSaveTime=null;

function cloneData(data){return JSON.parse(JSON.stringify(data));}

function migrateFromLegacyKeys(){
const legacyData={wikiEntries:new Map(),chapters:new Map()};
LEGACY_KEYS.forEach(key=>{
const val=localStorage.getItem(key);
if(!val)return;
try{
const parsed=JSON.parse(val);
if(Array.isArray(parsed)){
if(parsed.length>0&&parsed[0].id&&parsed[0].name){
parsed.forEach(entry=>{
if(entry.id&&!legacyData.wikiEntries.has(entry.id)){
legacyData.wikiEntries.set(entry.id,entry);
}
});
}else if(parsed.length>0&&parsed[0].id&&parsed[0].chapter_number){
parsed.forEach(ch=>{
if(ch.id&&!legacyData.chapters.has(ch.id)){
legacyData.chapters.set(ch.id,ch);
}
});
}
}else if(parsed.wikiEntries&&parsed.chapters){
if(Array.isArray(parsed.wikiEntries)){
parsed.wikiEntries.forEach(entry=>{
if(entry.id&&!legacyData.wikiEntries.has(entry.id)){
legacyData.wikiEntries.set(entry.id,entry);
}
});
}
if(Array.isArray(parsed.chapters)){
parsed.chapters.forEach(ch=>{
if(ch.id&&!legacyData.chapters.has(ch.id)){
legacyData.chapters.set(ch.id,ch);
}
});
}
}
}catch(e){}
});
return{wikiEntries:Array.from(legacyData.wikiEntries.values()),chapters:Array.from(legacyData.chapters.values())};
}

function detectOldKeys(){
const detected={};
LEGACY_KEYS.forEach(key=>{
const val=localStorage.getItem(key);
if(val){
try{
const parsed=JSON.parse(val);
if(Array.isArray(parsed)){
detected[key]={exists:true,recordCount:parsed.length,type:parsed.length>0&&parsed[0].chapter_number?'chapters':'wiki'};
}else if(parsed.wikiEntries||parsed.chapters){
detected[key]={exists:true,recordCount:(parsed.wikiEntries?.length||0)+(parsed.chapters?.length||0),type:'mixed'};
}else{
detected[key]={exists:true,recordCount:0,type:'unknown'};
}
}catch(e){
detected[key]={exists:true,recordCount:0,type:'invalid'};
}
}else{
detected[key]={exists:false,recordCount:0,type:null};
}
});
return detected;
}

function loadDatabase(){
const stored=localStorage.getItem(CANONICAL_KEY);
if(stored){
try{
const parsed=JSON.parse(stored);
if(parsed.version===1&&Array.isArray(parsed.wikiEntries)&&Array.isArray(parsed.chapters)){
lastLoadTime=new Date().toISOString();
return{wikiEntries:parsed.wikiEntries,chapters:parsed.chapters};
}
}catch(e){}
}
return{wikiEntries:cloneData(defaultWikiEntries),chapters:cloneData(defaultChapters)};
}

function saveDatabase(){
const db={version:1,wikiEntries,chapters};
localStorage.setItem(CANONICAL_KEY,JSON.stringify(db));
lastSaveTime=new Date().toISOString();
const verify=localStorage.getItem(CANONICAL_KEY);
if(!verify){return false;}
try{
const parsed=JSON.parse(verify);
if(parsed.wikiEntries.length!==wikiEntries.length||parsed.chapters.length!==chapters.length){
return false;
}
return true;
}catch(e){return false;}
}

function getRoute(){
const h=window.location.hash.slice(1)||'home';
if(h.startsWith('detail-'))return{page:'detail',param:h.slice(7)};
if(h.startsWith('read-'))return{page:'read',param:h.slice(5)};
return{page:h,param:null};
}

function render(){
const{page,param}=getRoute();
const activePage=page==='detail'||page==='read'?'':page;
renderNav(activePage);
switch(page){
case'home':renderHome();break;
case'wiki':renderWiki();break;
case'timeline':renderTimeline();break;
case'reader':renderReader();break;
case'archive':renderArchive();break;
case'manage':renderManage();break;
case'detail':renderDetail(param);break;
case'read':renderRead(param);break;
default:renderHome();
}
lucide.createIcons();
}

function filterWiki(){
const q=(document.getElementById('wiki-search').value||'').toLowerCase();
const cat=document.getElementById('wiki-cat').value;
const st=document.getElementById('wiki-status').value;
const era=document.getElementById('wiki-era').value;
const sort=document.getElementById('wiki-sort').value;
let filtered=wikiEntries.filter(e=>{
if(q&&!e.name.toLowerCase().includes(q)&&!e.description.toLowerCase().includes(q))return false;
if(cat&&e.category!==cat)return false;
if(st&&e.status!==st)return false;
if(era&&e.era!==era)return false;
return true;
});
if(sort==='az')filtered.sort((a,b)=>a.name.localeCompare(b.name));
else if(sort==='za')filtered.sort((a,b)=>b.name.localeCompare(a.name));
else if(sort==='cat')filtered.sort((a,b)=>a.category.localeCompare(b.category));
else if(sort==='status')filtered.sort((a,b)=>a.status.localeCompare(b.status));
else if(sort==='era')filtered.sort((a,b)=>a.era.localeCompare(b.era));
document.getElementById('wiki-grid').innerHTML=filtered.map(e=>`<div class="card" onclick="navigate('detail','${e.id}')">
<h4 class="font-bold mb-1" style="color:var(--gold)">${e.name}</h4>

</div>`).join('')||'<p style="color:var(--text-muted)">Không có kết quả.</p>';
}

function filterChapters(){
const q=(document.getElementById('ch-search').value||'').toLowerCase();
const arc=document.getElementById('ch-arc').value;
const st=document.getElementById('ch-status').value;
let filtered=chapters.filter(c=>{
if(q&&!c.title.toLowerCase().includes(q)&&!c.summary.toLowerCase().includes(q))return false;

});

function recoverOldData(){
const legacy=migrateFromLegacyKeys();
const mergedWiki=new Map();
const mergedChapters=new Map();
wikiEntries.forEach(e=>{if(e.id)mergedWiki.set(e.id,e);});
legacy.wikiEntries.forEach(e=>{if(e.id)mergedWiki.set(e.id,e);});
chapters.forEach(c=>{if(c.id)mergedChapters.set(c.id,c);});
legacy.chapters.forEach(c=>{if(c.id)mergedChapters.set(c.id,c);});
const newWiki=Array.from(mergedWiki.values());
const newChap=Array.from(mergedChapters.values());
const added_wiki=newWiki.length-wikiEntries.length;
const added_ch=newChap.length-chapters.length;
if(!confirm(`Phục hồi sẽ thêm ${added_wiki} hồ sơ wiki mới và ${added_ch} chương mới.\n\nTiếp tục?`)){return;}
wikiEntries=newWiki;
chapters=newChap;
if(!saveDatabase()){showStatus('Lỗi lưu dữ liệu: số lượng hồ sơ sau khi lưu không khớp.','error');return;}
showStatus(`Phục hồi thành công: +${added_wiki} wiki, +${added_ch} chapters.`,'success');
setTimeout(()=>{render();},500);
}

function createEmergencyBackup(){
const full={version:1,wikiEntries,chapters};
document.getElementById('export-output').value=JSON.stringify(full,null,2);
showStatus('Đã xuất dữ liệu khẩn cấp.','success');
}

function importWikiJSON(){
const textarea=document.getElementById('wiki-import');
if(!textarea.value.trim()){showStatus('Vui lòng nhập dữ liệu.','error');return;}
try{
const data=JSON.parse(textarea.value);
if(!Array.isArray(data)){showStatus('Lỗi JSON: phải là một array.','error');return;}
const existing=new Map();
wikiEntries.forEach(e=>{if(e.id)existing.set(e.id,e);});
data.forEach(entry=>{
if(entry.id){existing.set(entry.id,entry);}
});
wikiEntries=Array.from(existing.values());
if(!saveDatabase()){showStatus('Lỗi lưu dữ liệu: số lượng hồ sơ sau khi lưu không khớp.','error');return;}
textarea.value='';
showStatus('Import thành công: '+data.length+' hồ sơ.','success');
setTimeout(()=>{render();},500);
}catch(e){
showStatus('Lỗi JSON: vui lòng kiểm tra dấu phẩy hoặc ngoặc.','error');
}
}

function importChaptersJSON(){

const existing=new Map();

function resetDatabase(){
  const backup={
    version:1,
    wikiEntries:cloneData(wikiEntries),
    chapters:cloneData(chapters)
  };

  const exportBox=document.getElementById('export-output');

  if(exportBox){
    exportBox.value=JSON.stringify(backup,null,2);
  }

  const confirmed=confirm(
    'Bạn chắc chắn muốn xóa toàn bộ dữ liệu đã nhập và '+
    'khôi phục dữ liệu mặc định?\n\n'+
    'Database hiện tại đã được đưa vào ô Export để sao lưu.'
  );

  if(!confirmed)return;

  const oldWiki=cloneData(wikiEntries);
  const oldChapters=cloneData(chapters);

  wikiEntries=cloneData(defaultWikiEntries);
  chapters=cloneData(defaultChapters);

  if(!saveDatabase()){
    wikiEntries=oldWiki;
    chapters=oldChapters;
    saveDatabase();

    showStatus(
      'Reset thất bại. Dữ liệu cũ đã được phục hồi.',
      'error'
    );

    return;
  }

  showStatus(
    'Đã khôi phục dữ liệu mặc định.',
    'success'
  );

  setTimeout(render,500);
}

let ids=[];
try{
if(input.startsWith('[')){
ids=JSON.parse(input);
if(!Array.isArray(ids)){throw new Error('Must be array');}
ids=ids.map(id=>String(id).trim()).filter(id=>id.length>0);
}else{
ids=input.split('\n').map(line=>line.trim()).filter(line=>line.length>0);
}
}catch(e){
showStatus('Lỗi JSON hoặc định dạng. Vui lòng kiểm tra lại.','error');
return null;
}
if(ids.length===0){showStatus('Không có ID nào được tìm thấy.','error');return null;}
return ids;
}

function previewRecordsForDeletion(){
const ids=parseDeleteIds();
if(!ids){return;}
const preview=document.getElementById('delete-preview');
const records=[];
const missing=[];
ids.forEach(id=>{
const wiki=findEntryById(id);
if(wiki){records.push({id,name:wiki.name,type:'Wiki'});return;}
const chap=chapters.find(c=>c.id===id);
if(chap){records.push({id,name:chap.title||'Chương '+chap.chapter_number,type:'Chapter'});return;}
missing.push(id);
});
let html='<div style="border:1px solid var(--border);border-radius:4px;padding:1rem;background:var(--surface2)">';
if(records.length>0){
html+=`<h4 style="color:var(--gold);font-weight:600;margin-bottom:0.5rem">Bản Ghi Sẽ Xóa (${records.length}):</h4>`;
html+='<div style="margin-bottom:1rem">';
records.forEach(r=>{
html+=`<div style="padding:0.5rem;background:var(--surface);border-left:3px solid var(--red);margin-bottom:0.25rem"><span style="color:var(--text-muted);font-size:0.85rem">${r.type}</span> <span style="color:var(--gold);font-weight:600">${r.name}</span> <span style="color:var(--text-muted);font-family:monospace;font-size:0.8rem">(${r.id})</span></div>`;
});
html+='</div>';
}
if(missing.length>0){
html+=`<div style="background:linear-gradient(135deg,#1a0a0a,#0d0f14);border:1px solid var(--red);border-radius:4px;padding:0.75rem"><p style="color:var(--red-light);font-weight:600;margin:0;margin-bottom:0.5rem">Không tìm thấy bản ghi:</p>`;
missing.forEach(m=>{
html+=`<div style="color:var(--text-muted);font-family:monospace;font-size:0.9rem;margin-bottom:0.25rem">${m}</div>`;
});
html+='</div>';
}
html+='</div>';
preview.innerHTML=html;
document.getElementById('delete-confirm-btn').style.display=missing.length===0&&records.length>0?'block':'none';
if(missing.length>0){
showStatus(`Không tìm thấy ${missing.length} bản ghi.`,'error');
}
}

function confirmRecordDeletion(){
  const ids=parseDeleteIds();
  if(!ids)return;

  const foundWiki=wikiEntries.filter(
    entry=>ids.includes(entry.id)
  );

  const foundChapters=chapters.filter(
    chapter=>ids.includes(chapter.id)
  );

  const foundCount=
    foundWiki.length+
    foundChapters.length;

  if(foundCount===0){
    showStatus(
      'Không tìm thấy bản ghi phù hợp.',
      'error'
    );

    return;
  }

  const backup={
    version:1,
    wikiEntries:cloneData(wikiEntries),
    chapters:cloneData(chapters)
  };

  const exportBox=document.getElementById('export-output');

  if(exportBox){
    exportBox.value=JSON.stringify(backup,null,2);
  }

  const confirmed=confirm(
    `Bạn chắc chắn muốn xóa ${foundCount} bản ghi?\n\n`+
    'Database hiện tại đã được đưa vào ô Export để sao lưu.'
  );

  if(!confirmed)return;

  const oldWiki=cloneData(wikiEntries);
  const oldChapters=cloneData(chapters);

  wikiEntries=wikiEntries.filter(
    entry=>!ids.includes(entry.id)
  );

  chapters=chapters.filter(
    chapter=>!ids.includes(chapter.id)
  );

  if(!saveDatabase()){
    wikiEntries=oldWiki;
    chapters=oldChapters;
    saveDatabase();

    showStatus(
      'Lỗi lưu dữ liệu. Thay đổi đã được hoàn tác.',
      'error'
    );

    return;
  }

  let verified;

  try{
    const stored=localStorage.getItem(CANONICAL_KEY);

    if(!stored){
      throw new Error('Không tìm thấy database sau khi lưu.');
    }

    verified=JSON.parse(stored);
  }catch(error){
    wikiEntries=oldWiki;
    chapters=oldChapters;
    saveDatabase();

    showStatus(
      'Lỗi xác minh dữ liệu. Thay đổi đã được hoàn tác.',
      'error'
    );

    return;
  }

  const failedIds=ids.filter(id=>
    verified.wikiEntries.some(entry=>entry.id===id)||
    verified.chapters.some(chapter=>chapter.id===id)
  );

  if(failedIds.length>0){
    wikiEntries=oldWiki;
    chapters=oldChapters;
    saveDatabase();

    showStatus(
      `Không thể xóa: ${failedIds.join(', ')}. Đã hoàn tác.`,
      'error'
    );

    return;
  }

  const input=document.getElementById('delete-ids-input');
  const preview=document.getElementById('delete-preview');
  const deleteButton=document.getElementById('delete-confirm-btn');

  if(input)input.value='';
  if(preview)preview.innerHTML='';
  if(deleteButton)deleteButton.style.display='none';

  showStatus(
    `Đã xóa thành công ${foundCount} bản ghi.`,
    'success'
  );

  setTimeout(render,500);
}

window.addEventListener('hashchange',render);
render();
</script>
</body></html>
